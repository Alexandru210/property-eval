<section class="account-page" aria-labelledby="my-evaluations-title">
  <div class="account-shell">
    <header class="account-header">
      <p class="eyebrow">Valuation history</p>
      <div>
        <h1 id="my-evaluations-title">My Evaluations</h1>
        <p class="intro">Review property estimates, report status, and valuation history.</p>
      </div>
    </header>

    <div class="stats-grid" aria-label="Evaluation summary">
      @for (stat of stats; track stat.label) {
        <article class="stat-card">
          <span>{{ stat.label }}</span>
          <strong>{{ stat.value }}</strong>
        </article>
      }
    </div>

    <section class="empty-panel" aria-labelledby="evaluations-empty-title">
      <div class="empty-icon" aria-hidden="true">E</div>
      <div>
        <h2 id="evaluations-empty-title">No evaluations yet</h2>
        <p>Requested valuations and saved estimates will appear here.</p>
      </div>
      <a class="btn btn-primary" routerLink="/evaluate">Request evaluation</a>
    </section>
  </div>
</section>
