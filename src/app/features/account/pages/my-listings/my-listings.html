<section class="account-page" aria-labelledby="my-listings-title">
  <div class="account-shell">
    <header class="account-header">
      <p class="eyebrow">Seller workspace</p>
      <div>
        <h1 id="my-listings-title">My Listings</h1>
        <p class="intro">Track published homes, draft listings, and buyer activity.</p>
      </div>
    </header>

    <div class="stats-grid" aria-label="Listing summary">
      @for (stat of stats; track stat.label) {
        <article class="stat-card">
          <span>{{ stat.label }}</span>
          <strong>{{ stat.value }}</strong>
        </article>
      }
    </div>

    <section class="empty-panel" aria-labelledby="listings-empty-title">
      <div class="empty-icon" aria-hidden="true">+</div>
      <div>
        <h2 id="listings-empty-title">No listings yet</h2>
        <p>Your property listings will appear here once you publish or save a draft.</p>
      </div>
      <a class="btn btn-primary" routerLink="/sell">Create listing</a>
    </section>
  </div>
</section>
